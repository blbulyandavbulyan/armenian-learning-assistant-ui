name: KMP Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Use ubuntu-latest as it is fully equipped for Web (WASM/JS) and JVM targets.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Set up Java environment required by Gradle
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'

      # The official Gradle action for caching and executing Gradle builds
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 #v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Compile the application code (without running tests)
      - name: Compile Application
        run: ./gradlew assemble

      # Run the test suites
      - name: Run Tests
        run: ./gradlew check koverXmlReport

      # SonarCloud Scan
      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info

      # Upload Reports (only after completion of Run Tests step)
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-reports
          # The '**' tells it to look in all directories/modules
          path: '**/build/reports/**'

  analyze:
    name: Analyze
    needs: build
    runs-on: ubuntu-latest

    # Required permissions to upload the scanning results to GitHub Security tab
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 #v6

      # Initializes the CodeQL tools for vulnerability scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # CodeQL requires the project to be built while it traces the compilation
      - name: Build project
        run: ./gradlew assemble

      # Performs the actual analysis and uploads the results
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
