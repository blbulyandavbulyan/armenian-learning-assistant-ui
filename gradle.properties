# Give Kotlin Compiler 2560M so Wasm Production lowered IR fits in heap
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx2560M -XX:+UseG1GC

# Keep Gradle Daemon capped at 2048M
org.gradle.jvmargs=-Xmx2048M -XX:MaxMetaspaceSize=512M -XX:+UseG1GC -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

# Android
android.nonTransitiveRClass=true
android.useAndroidX=true