# Kotlin Compiler Daemon (Down from 3GB to 1.5GB)
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx1536M -XX:+UseG1GC

# Gradle Daemon (Down from 4GB to 2GB)
org.gradle.jvmargs=-Xmx2048M -XX:MaxMetaspaceSize=512M -XX:+UseG1GC -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

# Android
android.nonTransitiveRClass=true
android.useAndroidX=true